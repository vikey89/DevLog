name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Read version from Gradle
        id: get
        run: echo "version=$(./gradlew -q printVersion)" >> "$GITHUB_OUTPUT"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Detekt
        run: ./gradlew detekt

      - name: Test
        run: ./gradlew test

  native-build:
    needs: [version, test]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: devlog-linux-amd64
          - os: macos-14
            artifact: devlog-macos-arm64
          - os: windows-latest
            artifact: devlog-windows-amd64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '22'
          distribution: graalvm-community

      - uses: gradle/actions/setup-gradle@v4

      - name: Native compile
        run: ./gradlew nativeCompile

      - name: Rename artifact (Unix)
        if: runner.os != 'Windows'
        run: cp build/native/nativeCompile/devlog ${{ matrix.artifact }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: copy build\native\nativeCompile\devlog.exe ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: [version, native-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ needs.version.outputs.version }}
          generate_release_notes: true
          files: artifacts/*
